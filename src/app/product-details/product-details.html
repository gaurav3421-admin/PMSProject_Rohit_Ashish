<div class="container-fluid my-5">
    <h2 class="text-center mb-5 fw-bold">Shopping Cart</h2>

    <div class="row">
        <!-- Cart Items Column -->
        <div class="col-12">
            <div class="card shadow-sm mb-4">
                <div class="row g-0 align-items-center">
                    
                    

                    <!-- Product Table Content -->
                    <div class="col-12">
                        <div class="card-body">
                            <div class="table-responsive w-100">
                                <table class="table table-hover align-middle mb-0 w-100">
                                    <thead class="table-light">
                                        <tr>
                                            <th scope="col">ID</th>
                                            <th scope="col">Title</th>
                                            <th scope="col">Description</th>
                                            <th scope="col">Category</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr *ngFor="let productlist of products">
                                            <th scope="row" class="fw-semibold">{{ productlist.id }}</th>
                                            <td>{{ productlist.title }}</td>
                                            <td class="text-muted small">{{ productlist.description }}</td>
                                            <td>
                                                <span class="badge rounded-pill text-bg-secondary">
                                                    {{ productlist.category }}
                                                </span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
